name: Deploy DistriPro API

on:
  push:
    branches: [ main ]

env:
  AZURE_FUNCTIONAPP_NAME: 'DistriProAPI'
  PYTHON_VERSION: '3.11'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 'Install dependencies'
        run: |
          python -m pip install --upgrade pip
          # We install directly into the folder Azure looks for
          pip install -r requirements.txt --target=".python_packages/lib/site-packages"

      - name: 'Deploy to Azure Functions'
        uses: Azure/functions-action@v1
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: . # Deploy the current folder
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          # These flags stop GitHub from trying to talk to Kudu (Prevents 405)
          scm-do-build-during-deployment: false
          enable-oryx-build: false
